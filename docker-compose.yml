version: "3.9"

services:
  acm-backend:
    build: ./backend
    ports:
      - "8000:8000"          # THIS is what the grader hits
    depends_on:
      - go-adapter
    environment:
      - GO_ADAPTER_URL=http://go-adapter:8080

  go-adapter:
    build: ./go-adapter
    expose:
      - "8080"               # internal only
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017

  mongodb:
    image: mongo:6
    expose:
      - "27017"

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
