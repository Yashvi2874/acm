version: "3.9"

services:

  go-adapter:
    build: ./go-adapter
    ports:
      - "8080:8080"
    environment:
      - MONGO_URI=mongodb+srv://yashasvig_db_user:ENzdThDvVBAg6VUi@cluster0.ltykwqy.mongodb.net/?appName=ACM
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  acm-backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      go-adapter:
        condition: service_healthy
    environment:
      - GO_ADAPTER_URL=http://go-adapter:8080
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      acm-backend:
        condition: service_healthy
