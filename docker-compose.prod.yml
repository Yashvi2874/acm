version: "3.9"

services:

  go-adapter:
    image: YOURUSERNAME/go-adapter:latest
    expose:
      - "8080"
    environment:
      - MONGO_URI=mongodb+srv://rajasekharp_db_user:vM4MT9yMtda7dCKj@nsh-test.klojnbb.mongodb.net/?appName=NSH-Test
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  acm-backend:
    image: YOURUSERNAME/acm-backend:latest
    ports:
      - "8000:8000"
    depends_on:
      go-adapter:
        condition: service_healthy
    environment:
      - GO_ADAPTER_URL=http://go-adapter:8080
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: YOURUSERNAME/acm-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      acm-backend:
        condition: service_healthy
